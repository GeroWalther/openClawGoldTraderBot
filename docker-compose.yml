services:
  trader:
    build: .
    container_name: gold-trader
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - .env
    volumes:
      - trader-data:/app/data
      - ./journal:/app/journal
      - ./.env:/app/.env:ro
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/trades.db

volumes:
  trader-data:
